<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The Library Website</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/h5p-standalone/dist/styles/h5p.css">
</head>

<body>

<!-- H5P Selector -->
<select id="h5p-selector">
  <option value="library-website">Library Website</option>
  <option value="zotero-demo">Zotero Demo</option>
  <option value="pq-widget">PQ Widget</option>
  <option value="pq-tutorial">PQ Tutorial</option>
  <option value="library-tour">Library Website Tour</option>
  <option value="ill-tutorial">InterLibrary Loan Tutorial</option>
  <option value="ill-request">InterLibrary Loan</option>
  <option value="jones-search">Jones Search</option>
  <option value="ebooks-tutorial">Ebooks Tutorial</option>
  <option value="gs-widget">GS Widget</option>
  <option value="google-scholar-video">Google Scholar Video</option>
  <option value="ebsco-ebooks-1">EBSCO eBooks 1</option>
  <option value="ebsco-ebooks-2">EBSCO eBooks 2</option>
  <option value="atla-widget">ATLA Widget</option>
  <option value="atla">ATLA</option>
  <option value="asp-widget">ASP Widget</option>
  <option value="asp">ASP</option>
  <option value="academic-writer-widget">Academic Writer Widget</option>
  <option value="academic-writer-video">Academic Writer Video</option>
</select>

<!-- H5P Container -->
<div id="h5p-container"></div>

<!-- H5P Library -->
<script src="https://cdn.jsdelivr.net/npm/h5p-standalone/dist/main.bundle.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

  const container = document.getElementById('h5p-container');
  const selector = document.getElementById('h5p-selector');

  function loadH5P(folder) {

    console.log("Loading H5P:", folder);

    // Hard reset container
    container.innerHTML = "";

    // Delay fixes race condition in H5P init
    setTimeout(() => {

      try {
        new H5PStandalone.H5P(container, {
          h5pJsonPath: './content/' + folder,
          frameJs: 'https://cdn.jsdelivr.net/npm/h5p-standalone/dist/frame.bundle.js',
          frameCss: 'https://cdn.jsdelivr.net/npm/h5p-standalone/dist/styles/h5p.css'
        });
      } catch (e) {
        console.error("H5P load failed:", folder, e);
        container.innerHTML =
          "<p style='color:red'>Failed to load: " + folder + "</p>";
      }

    }, 100); // IMPORTANT delay
  }

  // Switch H5P on dropdown change
  selector.addEventListener('change', function () {
    loadH5P(this.value);
  });

  // Initial load
  loadH5P(selector.value);

});
</script>

</body>
</html>
